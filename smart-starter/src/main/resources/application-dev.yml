spring:
  # MySQL 数据源
  datasource:
    mysql:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306/appdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: appuser
      password: apppass
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
        idle-timeout: 30000
        connection-timeout: 30000

    # PostgreSQL 数据源
    postgres:
      driver-class-name: org.postgresql.Driver
      jdbc-url: jdbc:postgresql://localhost:5432/appdb
      username: appuser
      password: apppass
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        minimum-idle: 3
        maximum-pool-size: 10

  # Redis
  data:
    redis:
      host: localhost
      port: 16379
      password: redis123
      database: 0
      timeout: 5000ms

  # Kafka
  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      group-id: smart-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # Elasticsearch
  elasticsearch:
    uris: http://localhost:9200

  # Spring AI - OpenAI 兼容配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4
          temperature: 0.7
