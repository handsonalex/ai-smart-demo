# ============================
# 服务器配置
# ============================
server:
  # 应用监听端口，启动后通过 http://localhost:8080 访问
  port: 8080

spring:
  profiles:
    # 激活的环境配置文件，此处为 dev（开发环境），对应 application-dev.yml
    # 可选值：dev（开发）、test（测试）、prod（生产）
    active: dev
  application:
    # 应用名称，用于服务注册、日志标识等场景
    name: ai-smart-demo

  # ============================
  # Jackson JSON 序列化配置
  # ============================
  # Jackson 是 Spring Boot 默认的 JSON 序列化/反序列化框架
  jackson:
    # 日期类型字段的输出格式，例如：2025-03-19 14:30:00
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区设置为东八区（中国标准时间），确保日期时间显示正确
    time-zone: Asia/Shanghai
    serialization:
      # 关闭将日期序列化为时间戳（毫秒数）的行为，改为使用上面指定的格式化字符串
      write-dates-as-timestamps: false

# ============================
# MyBatis Plus 配置
# ============================
# MyBatis Plus 是 MyBatis 的增强工具，简化 CRUD 操作
mybatis-plus:
  configuration:
    # 开启数据库下划线命名到 Java 驼峰命名的自动映射
    # 例如：数据库字段 user_name 自动映射到 Java 属性 userName
    map-underscore-to-camel-case: true
    # SQL 日志实现类，使用 StdOutImpl 将执行的 SQL 打印到控制台（仅开发调试用）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键生成策略：assign_id 表示使用雪花算法（Snowflake）自动生成分布式唯一 ID
      id-type: assign_id
      # 逻辑删除字段名，对应实体类中的 deleted 属性
      logic-delete-field: deleted
      # 逻辑删除值：1 表示已删除（查询时自动过滤该记录）
      logic-delete-value: 1
      # 逻辑未删除值：0 表示未删除（正常状态）
      logic-not-delete-value: 0

# ============================
# SpringDoc / Swagger 接口文档配置
# ============================
# SpringDoc 基于 OpenAPI 3.0 规范，自动生成 RESTful API 文档
springdoc:
  api-docs:
    # OpenAPI 3.0 JSON 描述文件的访问路径
    path: /v3/api-docs
  swagger-ui:
    # Swagger UI 可视化界面的访问路径，启动后访问 http://localhost:8080/swagger-ui.html
    path: /swagger-ui.html
    # 标签（Tag）按字母顺序排列
    tags-sorter: alpha
    # 接口操作（Operation）按字母顺序排列
    operations-sorter: alpha

# ============================
# 日志级别配置
# ============================
logging:
  level:
    # 项目自身代码（com.smart 包）的日志级别设为 DEBUG，输出详细调试信息
    com.smart: DEBUG
    # Spring AI 框架的日志级别设为 DEBUG，便于调试 AI 调用过程
    org.springframework.ai: DEBUG
